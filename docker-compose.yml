services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: inteligentresearch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inteligentresearch"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/inteligentresearch
      SECRET_KEY: dev-secret-change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      FRONTEND_URL: http://localhost:5173
      DEV_RETURN_OTP: "true"
      # Optional Google OAuth (leave empty for local dev)
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  frontend_node_modules:
